version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install poetry
      - poetry config virtualenvs.create false
      - poetry install --no-interaction --no-ansi --no-root
run:
  command: python -m src.web
  network:
    port: 8080
    env: PORT
  env:
    - name: BUYER_PORT
      value: "8080"
    - name: AWS_REGION
      value: "us-west-2"
    - name: AWS_SECRET_NAME
      value: "hackathon/buyer-agent"
